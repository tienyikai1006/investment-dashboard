.us-stock-pro.add-mode .pro-hero.add-position-lab{
  display:grid;
  grid-template-columns:1fr;
}
.add-stock-focus-card{
  overflow:hidden;
  background:
    radial-gradient(circle at top right,rgba(99,164,255,.16),transparent 32%),
    radial-gradient(circle at bottom left,rgba(185,145,255,.12),transparent 26%),
    linear-gradient(180deg,rgba(255,255,255,.045),rgba(255,255,255,.015)),
    rgba(17,19,24,.96)!important;
  padding:26px!important;
}
.add-stock-title-row{
  padding-bottom:18px;
  border-bottom:1px solid rgba(255,255,255,.07);
}
.add-stock-form-grid{
  display:grid;
  grid-template-columns:1.15fr .85fr;
  gap:18px;
  margin-top:18px;
}
.add-stock-search-panel,.add-stock-order-panel{
  border:1px solid rgba(255,255,255,.075);
  border-radius:24px;
  background:rgba(0,0,0,.18);
  padding:20px;
}
.add-stock-order-panel{
  background:linear-gradient(180deg,rgba(99,164,255,.055),rgba(255,255,255,.012)),rgba(0,0,0,.16);
}
.add-stock-step{
  color:var(--muted);
  font-size:12px;
  font-weight:800;
  letter-spacing:.5px;
  text-transform:uppercase;
  margin-bottom:12px;
}
.add-stock-search-box{
  grid-template-columns:minmax(0,1fr) 120px;
  margin-top:0;
}
.add-stock-search-box input{
  min-height:52px;
  font-size:16px;
  font-weight:800;
  letter-spacing:.6px;
  text-transform:uppercase;
}
.add-stock-search-box .btn{
  min-height:52px;
  border-radius:17px;
}
.add-stock-position-form{
  display:grid;
  grid-template-columns:1fr;
  gap:14px;
  margin-top:0;
}
.add-stock-position-form .field{
  gap:9px;
  font-size:13px;
}
.add-stock-position-form input{
  min-height:54px;
  font-size:16px;
  font-weight:800;
}
.add-stock-submit{
  min-height:56px;
  width:100%;
  border-radius:18px!important;
  font-size:15px!important;
  margin-top:2px;
}
